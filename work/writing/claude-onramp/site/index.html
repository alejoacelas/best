<style>
  :root {
    --bg: #faf9f7; --fg: #201d1a; --muted: #6b645c; --line: #e7e2db;

  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1a1817; --fg:#e9e4dd; --muted:#a49b90; --line:#333029;

  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .app { display:grid; grid-template-columns:250px minmax(0,1fr) 340px;
    min-height:100vh; }
  nav { border-right:1px solid var(--line); padding:24px 18px; position:sticky;
    top:0; height:100vh; overflow:auto; }
  nav h1 { font-size:15px; letter-spacing:.02em; margin:0 0 20px; }
  nav .sec { font-size:11px; text-transform:uppercase; letter-spacing:.08em;

  nav a { display:block; padding:5px 8px; margin:1px 0; border-radius:6px;

    overflow:auto; }
  main pre code { background:none; padding:0; }
  main table { border-collapse:collapse; width:100%; margin:16px 0; font-size:14px; }
  main th,main td { border:1px solid var(--line); padding:7px 10px; text-align:left; }
  main blockquote { border-left:3px solid var(--accent); margin:16px 0;

  main li.done { color:var(--muted); text-decoration:line-through;
    text-decoration-color:var(--accent); }
  main input[type=checkbox] { accent-color:var(--accent); cursor:pointer;
    margin-right:8px; width:15px; height:15px; vertical-align:-2px; }
  details { background:var(--card); border:1px solid var(--line);
    border-radius:10px; padding:2px 16px; margin:14px 0; }
  details summary { cursor:pointer; padding:10px 0; font-weight:600;
    color:var(--accent); }
  details[open] summary { border-bottom:1px solid var(--line); margin-bottom:10px; }
  aside { border-left:1px solid var(--line); padding:20px; position:sticky;
    top:0; height:100vh; display:flex; flex-direction:column; }

    padding:7px 11px; white-space:pre-wrap; max-width:85%; }

    height:18px; border-radius:50%; border:none; background:var(--fg);
    color:var(--bg); font-size:11px; line-height:1; cursor:pointer; padding:0; }

  .hint { font-size:11px; color:var(--muted); margin-top:8px; line-height:1.5; }

  @media (max-width:1100px){ .app{grid-template-columns:220px 1fr;} aside{display:none;} }

<body>
<div class="app">
  <nav id="nav"><h1>Claude On-Ramp</h1></nav>
  <main id="main"></main>
  <aside>
    <h2>Assistant</h2>
    <div class="sub">Stuck? Ask — this whole guide is loaded.</div>

      </div>

        <b>Win+Shift+S</b> on Windows, then paste here.</div>
    </div>
  </aside>

<script>
const DATA = {"content": {"00-start-here.md": "# Start here\n\nThis guide gives Claude your files, your apps, and — by the end — your whole\ncomputer, so you can hand off work. Not asking a chatbot a question and copying\nthe answer out: handing over a task and getting back finished work.\n\nIt changes which tasks you take on at all. The ones you skip today because\nthey're too technical, too fiddly, too slow, or too vague to start — those\nbecome things you delegate in a sentence.\n\n## The two tools\n\n**Claude Cowork** works out of the box — install one app, connect your accounts,\nstart delegating. No commands to type.\n\n**Claude Code** does more — it can run any tool your computer can, reach the\nwhole internet, and work on its own for an hour at a stretch — in exchange for\nabout thirty minutes of setup. It's where you'll end up for anything serious.\n\n## Which to read\n\n**Start with Cowork** (Part 1). It teaches the four ideas Claude Code takes for\ngranted — working in a folder, choosing a model, granting permissions, and\nmanaging context (how much one conversation can hold). Then Part 2 graduates\nyou to Claude Code.\n\n**Already fluent** with all four? Skip straight to\n[Part 2: Claude Code](02-claude-code.md).\n\n## One choice before you start\n\n**Which account.** Use your organization's **Claude Team account** if you have\none; a personal **Max** plan works just as well. Both include everything in this\nguide. → [Team vs. personal, and which tier →](decisions/account.md)\n\n---\n\n*Stuck? Every page has an assistant in the sidebar with this whole guide\nloaded. Tell it what you see — a screenshot works best — and it'll get you\nmoving.*\n", "01-cowork.md": "# Part 1 — Claude Cowork\n\nCowork is Claude with hands. You describe an outcome; it plans, works across\nyour files and connected apps for several steps, and hands back finished work.\nIt lives inside the Claude desktop app, and it's the fastest way to feel what\ndelegating to an agent is actually like.\n\nThis part is a series of small, self-contained things to do — most take about\nfive minutes, each ends with something worth trying, and by the last one you'll\nhave delegated real work and picked up the four ideas the rest of the guide\nrelies on.\n\n**The seven things you'll do here:**\n\n- [ ] **1** · Get Cowork running\n- [ ] **2** · Your first hand-off\n- [ ] **3** · Talk, don't type\n- [ ] **4** · Know what you're approving\n- [ ] **5** · Give it your accounts\n- [ ] **6** · Make it remember you\n- [ ] **7** · Teach it a skill\n\n---\n\n## 1 · Get Cowork running\n\n**Goal:** the Claude desktop app installed, the Cowork tab open, its sandbox\nready to work. **~5 min** (plus a one-time download).\n\nDownload the Claude desktop app from **[claude.com/download](https://claude.com/download)**\nand sign in. Open the **Cowork** tab. The first time you do, Claude downloads a\nsmall sandbox (~2 GB) where it runs its work safely — give it a minute.\n\n<details>\n<summary>Your computer is warning you about the app you downloaded →</summary>\n\nThat's normal. Any app downloaded from the internet gets a one-time \"are you\nsure?\" check.\n\n- **Mac:** if it says the app \"can't be opened because Apple cannot check it,\"\n  open **System Settings → Privacy & Security**, scroll down, and click **Open\n  Anyway**. This is expected for a fresh download.\n- **Windows:** if you see a blue \"Windows protected your PC\" box, click **More\n  info → Run anyway**.\n\nYou're approving *this* app, which you chose to download. That's fine.\n</details>\n\n<details>\n<summary>You need Cowork on Windows →</summary>\n\nCowork runs its sandbox in a lightweight virtual machine, so Windows needs one\nfeature turned on first. You need **Windows 10 (22H2) or newer**.\n\nIf you hit the error **\"Virtual Machine Platform not enabled\":**\n1. Press Start, type **\"Turn Windows features on or off,\"** open it.\n2. Tick **Virtual Machine Platform**.\n3. Click OK and **restart** your PC.\n\nThen reopen Cowork. (This is Windows' built-in virtualization — not the same as\nWSL, and you don't need to install anything else.)\n</details>\n\n<details>\n<summary>You're on a work laptop and something's blocked →</summary>\n\nManaged laptops sometimes block new apps or the Google sign-in you'll do in a\nminute. If you see \"blocked by your administrator\" or \"access blocked — admin\nneeds to review,\" that's IT policy, not you. Ask your IT contact to allowlist\nthe Claude desktop app (and, for connectors, Claude in the Google Admin\nconsole). The assistant can draft that message for you — just ask.\n</details>\n\n**✓ Done when** the Cowork tab is open and past its \"getting ready\" download.\n\n**Now try →** *\"Say hi, and tell me what you can and can't reach on my computer\nright now.\"* Its answer is a quick tour of the sandbox it lives in — the fence\nthat Part 2 removes.\n\n---\n\n## 2 · Your first hand-off\n\n**Goal:** one real task delegated start to finish, so you feel the handoff\ninstead of reading about it. **~5 min.**\n\n**First, pick the best model.** Somewhere in the interface is a model picker\n(Claude's models, fast to most-capable, are Haiku, Sonnet, Opus). Set it to the\nbest one and leave it there. The reasons you'd pick a weaker model — speed, cost\n— both have better answers than \"use a weaker model.\" → [Why: just use the best\nmodel →](decisions/which-model.md)\n\nNow point Cowork at a folder and give it something concrete. A good first task:\npick a messy folder — a downloads pile, an unsorted project — and say:\n\n> *\"Look through this folder, tell me what's in it, and propose a way to\n> organize it. Don't move anything yet — just show me the plan.\"*\n\nWatch what happens. Cowork reads the files, thinks, and comes back with a\nproposal. That's the whole model in miniature: **you hand it a folder and an\noutcome; it works; it shows you.** You stay in the loop by reacting, not by\ndoing the steps yourself.\n\nPick something where a wrong answer costs you nothing. The point right now is to\nfeel the handoff, not to get a perfect result.\n\n**✓ Done when** you've read back a plan Cowork produced from a request you gave\nit.\n\n**Now try →** *\"Good — now actually do it, and move the files the way you\nproposed.\"* Watch it carry out its own plan.\n\n---\n\n## 3 · Talk, don't type\n\n**Goal:** a dictation tool installed, and your first request given by voice.\n**~5–10 min.**\n\nThe habit that most improves what you get back: **say your request out loud\ninstead of typing it.** When you type, you tidy up and leave out context. When\nyou talk, you ramble — and the ramble (why you care, what you're torn about,\nwhat you're unsure of) is exactly what makes the answer fit.\n\nInstall a dictation tool and use it for anything longer than a sentence. Our\npick is Wispr Flow. → [Which dictation tool, and why talking beats typing →](decisions/dictation.md)\n\n**✓ Done when** you've dictated one request to Cowork instead of typing it.\n\n**Now try →** ramble at it: *\"Here's this thing I keep meaning to sort out…\"* —\nand let the mess in your voice become a better brief than you'd have typed.\n\n---\n\n## 4 · Know what you're approving\n\n**Goal:** the one rule for permission prompts, felt on a real prompt. **~3 min.**\n\nBefore Cowork does anything with consequences — sending, deleting, sharing — it\nasks. The right instinct is simple: **you're not judging whether Claude is\ncapable; you're judging whether you could undo it.**\n\n- Reversible (editing a file, drafting, reorganizing)? Wave it through.\n- Irreversible (sending an email, deleting, publishing)? *That's* the prompt to\n  actually read.\n\nCowork is built to make this safe — it runs in a sandbox and asks before the\nscary stuff. → [How much to trust the agent (and why prompt injection shouldn't stop you) →](decisions/trust-and-permissions.md)\n\n**✓ Done when** you've seen both kinds of prompt and know which one to actually\nread.\n\n**Now try →** *\"Draft me a short email to myself, then send it.\"* Drafting won't\nstop for you; sending will. That pause is the whole rule in one gesture.\n\n---\n\n## 5 · Give it your accounts\n\n**Goal:** Gmail, Calendar, and Drive connected, and one task answered from them.\n**~5 min.**\n\nCowork gets far more useful once it can reach your email, calendar, and files.\nIn the desktop app, open the menu → **Connectors → Manage connectors**, and\nconnect **Google Drive**, then **Gmail** and **Google Calendar**. Each opens a\nGoogle sign-in where you grant access.\n\nA connector is just an account you've plugged in. Once connected, Claude can act\nthere — with the same permission prompts as everything else.\n\n<details>\n<summary>A browser tab opened and I'm not sure what to do →</summary>\n\nThat's the normal sign-in (\"OAuth\") dance. Google opens in your browser, asks\nyou to pick your account and approve access, then hands you back to Claude.\nApprove the access it asks for, and return to the Claude app — the connector\nwill now show as connected. If the tab seems to hang, come back to Claude\nanyway; it often already worked.\n</details>\n\n<details>\n<summary>Google says \"access blocked\" or \"admin needs to review\" →</summary>\n\nOn a work Google account, your organization has to allow Claude first. That's an\nIT setting (Google Admin console → API controls), not something you can fix from\nhere. Ask your admin to approve Claude; the assistant can draft the request.\n</details>\n\nThe built-in Google connectors mostly *read* (search your mail, read a doc). To\nhave Claude *write* — send mail, edit docs — you'll want the deeper setup in\n[Part 3](03-power-ups.md), or Claude Code. → [Which connectors are worth it →](decisions/connectors.md)\n\n**✓ Done when** at least one Google connector shows connected and Cowork has\nanswered a question using it.\n\n**Now try →** *\"What's on my calendar tomorrow, and is anything double-booked or\nback-to-back with no gap?\"*\n\n---\n\n## 6 · Make it remember you\n\n**Goal:** a running file it keeps as it works, plus a first note it reuses across\nchats. **~5 min.**\n\nTwo habits that turn Cowork from a one-shot answerer into something that\naccumulates.\n\n**Keep a running file.** Ask Cowork to hold a markdown file as it works — a\nrunning plan, notes, the output so far:\n\n> *\"Keep a file called `plan.md` as you go, and update it at each step.\"*\n\nThis isn't housekeeping. It does four things at once:\n\n- **Visibility** — you see the intermediate steps, not just the final answer.\n- **Course-correction** — you catch a wrong turn while it's cheap to fix.\n- **Specific asks** — you can point at a section and say \"redo this part.\"\n- **Reuse** — a good file is something you can hand back tomorrow to pick up\n  where you left off.\n\n**Teach it once.** That last one is the seed of the next idea. Once you've\nwritten the same context into three different chats — how you like things\nformatted, what your project is, who the audience is — stop retyping it. Put it\nin a file (or Cowork's instructions/memory) and point Claude at it. You've just\ngone from *re-explaining every time* to *teaching once*. In Claude Code this\nbecomes a file called `CLAUDE.md`, read automatically every session (Part 2);\nthe habit starts here.\n\n**✓ Done when** Cowork is keeping a markdown file for a task, and you've saved\none instruction it'll reuse.\n\n**Now try →** *\"Here are three things about how I like work delivered: [say\nthem]. Save them and use them from now on.\"* Then open a fresh chat and watch it\nalready know.\n\n---\n\n## 7 · Teach it a skill\n\n**Goal:** one repeatable task turned into a **skill** Cowork runs by name.\n**~5–10 min.**\n\nA reusable file is reuse for *you*. A **skill** is how that reuse becomes\nsomething you can **share**. It's a saved capability Claude can run by name.\nCowork already ships with some (it knows how to make PDFs, Word docs, slide\ndecks, spreadsheets). You can add your own: a folder with a `SKILL.md` file\ndescribing a task you do often — \"draft the weekly update from these sources,\"\n\"turn a transcript into a summary.\" Cowork discovers it and runs it when it\nfits. You don't write it by hand — ask Cowork to build it from a task you\ndescribe. We'll build a more powerful one in Part 2.\n\n**One habit before you move on: start fresh often.** Claude reads your whole\nconversation every time it replies, so long chats get slower, foggier, and more\nlikely to lose the thread. Start a new chat for each new task. You're not\n\"losing\" anything — the memory that counts now lives in your files and your\nskills, not in the chat history.\n\n**✓ Done when** you've made a skill and run it by name.\n\n**Now try →** take a chore you did last week, say *\"turn this into a skill,\"*\nthen run it by name and watch it go — the work done once, done forever after.\n\n---\n\n## What Cowork can't do — and why that's fine\n\nCowork is deliberately fenced so it's safe the moment you install it. The fence\nhas real edges:\n\n- It runs in a **Linux sandbox**, separate from your actual computer — so it\n  can't drive your Mac's apps or touch files outside what you give it.\n- Its **internet access is filtered** — it can use official connectors and\n  approved tools, but not make arbitrary calls to any service on the web.\n- It **can't log into command-line tools** (the `gh`, `gcloud`-style logins\n  some workflows need).\n\nNone of this is a flaw — it's the trade for \"works out of the box, safely.\" But\nevery item on that list is exactly what the next tool removes. When you want the\nfence gone, you want Claude Code.\n\n**→ [Part 2: Claude Code](02-claude-code.md)**\n", "02-claude-code.md": "# Part 2 — Claude Code\n\nClaude Code is the same assistant as Cowork, with the fence removed. It runs\ndirectly on your computer, so it can use any tool your machine can, reach the\nwhole internet, log into services, and work on its own for long stretches. This\nis the tool you'll reach for once you're delegating anything that matters.\n\nThe cost is about thirty minutes of setup, split into small pieces below. Each\none stands on its own and ends with something worth trying.\n\n> **Coming straight here?** Claude Code assumes four things you'd have picked up\n> in Part 1: an agent works in a **folder** you give it; you use the **best\n> model**; **permissions** are about whether an action is reversible, not\n> whether Claude is capable; and you **start fresh** for each task because\n> **context** fills up. If those are already second nature, read on. If not,\n> [Part 1](01-cowork.md) teaches them with nothing to install.\n\n**The seven things you'll do here:**\n\n- [ ] **1** · Get Claude Code running\n- [ ] **2** · Give Claude a memory of your changes (git)\n- [ ] **3** · Do a task Cowork couldn't\n- [ ] **4** · Let it run — auto mode\n- [ ] **5** · Teach it how you work — CLAUDE.md\n- [ ] **6** · Build a skill you can share\n- [ ] **7** · (Mac) Run several at once\n\n---\n\n## 1 · Get Claude Code running\n\n**Goal:** Claude Code installed and started, signed into your account, waiting\nfor a task. **~10 min.**\n\n**First, the terminal.** It's a text window where you type commands to your\ncomputer and it types back. That's the whole thing. You'll mostly use it to\nlaunch Claude and then watch *Claude* type into it — you don't need to learn\nterminal commands.\n\nOpen it: **Mac** — press ⌘Space, type \"Terminal,\" hit Return. **Windows** —\npress Start, type \"PowerShell,\" hit Return.\n\n<details>\n<summary>Copy and paste don't work the way I expect →</summary>\n\nTerminals are picky about copy-paste:\n- **Mac:** ⌘C and ⌘V work as normal.\n- **Windows (PowerShell):** use **Ctrl+Shift+C** to copy and **Ctrl+Shift+V** to\n  paste — plain Ctrl+C can interrupt whatever's running. Right-click also\n  pastes.\n\nIf you paste a command and it looks broken across two lines, you probably\ncopied it from a narrow window that wrapped it. Paste it into a plain note\nfirst, join it back into one line, then paste it in.\n</details>\n\n**Now install.** Copy the line for your system, paste it into the terminal, and\npress Return.\n\n**Mac:**\n```\ncurl -fsSL https://claude.ai/install.sh | bash\n```\n\n**Windows** (in PowerShell):\n```\nirm https://claude.ai/install.ps1 | iex\n```\n\nThat's the whole install — no other software required. When it finishes, type\n`claude` and press Return to start it. The first time, it opens your browser to\nsign in; choose your Claude account (the Team or Max account from\n[Start here](00-start-here.md)) and you're in.\n\n<details>\n<summary>It says \"command not found\" when I type claude →</summary>\n\nThe install finished, but your terminal was opened before it existed. Close the\nterminal window completely and open a fresh one, then type `claude` again. If\nit still isn't found, tell the assistant which system you're on and paste the\nlast few lines the installer printed.\n</details>\n\n**✓ Done when** you've typed `claude`, signed in, and see it waiting for your\nfirst message.\n\n**Now try →** *\"What folder are you in, and what's in it?\"* You're now talking\nto Claude directly on your own machine — no sandbox in between.\n\n---\n\n## 2 · Give Claude a memory of your changes\n\n**Goal:** git set up so every change Claude makes is a reversible save-point.\n**~5 min.**\n\nBefore you let Claude work freely, set up **git**. Git takes a snapshot of your\nfiles every time something changes, so any edit Claude makes can be undone —\nthink save-points in a game, not engineering. This is what makes it safe to let\nClaude run without approving every step.\n\nTwo small things to do:\n\n1. **Make a GitHub account** at [github.com](https://github.com) if you don't\n   have one (a few minutes). GitHub is where those save-points can be backed up\n   online.\n2. **Let Claude handle the rest.** Once Claude Code is running in a folder, just\n   ask: *\"Set up git here and commit the current state, then commit each change\n   you make from now on.\"* It knows how.\n\n<details>\n<summary>The installer is throwing dialogs at me / asking to install extra stuff →</summary>\n\nGetting git onto your machine sometimes triggers a chain of prompts. Approve\nthem; they're expected:\n- **Mac:** a box titled \"install the command line developer tools\" may pop up —\n  click **Install** and wait. This is Apple's own toolset, safe to accept.\n- **Windows:** the Git installer shows many screens of options. You can click\n  **Next** through all of them and **Install** — the defaults are fine.\n</details>\n\n<details>\n<summary>GitHub is asking me to set up two-factor / a passkey →</summary>\n\nGitHub now requires a second login factor. Easiest path: choose **passkey** if\nyour device offers it (Face ID / Touch ID / Windows Hello), or install an\nauthenticator app when prompted and scan the code. Do this once; it's quick.\n</details>\n\n**✓ Done when** Claude has made its first commit and told you it'll commit each\nchange from now on.\n\n**Now try →** *\"Show me the last thing you committed, then change one small thing\nand commit that too.\"* Now you can see the save-points stacking up — every one a\npoint you could roll back to.\n\n---\n\n## 3 · Do a task Cowork couldn't\n\n**Goal:** feel the fence come off — a task that reaches past the sandbox.\n**~5 min.**\n\nPoint Claude Code at the same messy folder you gave Cowork, and give it the same\nrequest. It'll feel familiar — that's on purpose.\n\nThen give it something Cowork *couldn't* do. For example:\n\n> *\"Find every PDF in this folder, pull out the total on each invoice, and build\n> a spreadsheet summarizing them.\"*\n\nClaude can install whatever tool it needs, read the files, and produce the\nresult — no sandbox in the way.\n\n**✓ Done when** Claude has done something that needed a tool it installed itself,\nor reached beyond a single folder.\n\n**Now try →** *\"Now find the three biggest invoices and chart them, and open the\nchart when you're done.\"* It fetches what it needs and opens the result on your\nactual screen.\n\n---\n\n## 4 · Let it run — auto mode\n\n**Goal:** Claude working without stopping to ask on every reversible step.\n**~2 min.**\n\nBy default, Claude Code asks permission before each action, which gets tiring\nfast. Press **Shift+Tab** to cycle its mode; land on **auto-accept edits**. Now\nClaude makes and applies changes without stopping to ask — and because git is\nrecording save-points, every one of those changes is reversible.\n\nThat's the whole trade: with your work under git, approving each edit guards\nagainst nothing and costs you constant interruption. Let it run. → [The full\npermissions philosophy — from paranoid to YOLO, and where to land →](decisions/trust-and-permissions.md)\n\n<details>\n<summary>What about the \"skip all permissions\" flag I've seen?</summary>\n\nThere's a `--dangerously-skip-permissions` mode that turns off every check. It's\nmeant for throwaway sandboxes and servers, not your real computer — on your own\nmachine it removes the guardrails that make mistakes cheap. Stick with\nauto-accept edits plus git.\n</details>\n\n**✓ Done when** you're in auto-accept edits and Claude has run a multi-step task\nwithout stopping to ask on each step.\n\n**Now try →** hand it something with a few moving parts — *\"rename these files to\na consistent scheme, then generate an index of what's here\"* — and just watch it\nwork the whole thing through.\n\n---\n\n## 5 · Teach it how you work — CLAUDE.md\n\n**Goal:** a `CLAUDE.md` file Claude reads at the start of every session. **~5\nmin.**\n\nRemember the reusable-instructions idea from Part 1? In Claude Code it has a\nhome: a file named **`CLAUDE.md`**. Anything you put there, Claude reads at the\nstart of every session — your preferences, your project's context, how you like\noutput formatted, what to never do.\n\nStart tiny. Ask Claude: *\"Make a CLAUDE.md and add a note that I prefer short,\ndirect answers and that you should always use `trash`, never `rm`, to delete\nfiles.\"* Add to it whenever you catch yourself explaining the same thing twice.\nThis one file is most of what separates a generic assistant from one that works\nthe way you do.\n\n**✓ Done when** a `CLAUDE.md` exists with at least one instruction in it.\n\n**Now try →** *\"Read my CLAUDE.md back to me, then guess three more preferences I\nprobably have and propose adding them.\"*\n\n---\n\n## 6 · Build a skill you can share\n\n**Goal:** a recurring task turned into a `/skill` you (or a teammate) run by\nname. **~5–10 min.**\n\nA **skill** turns a task you do repeatedly into something Claude runs by name.\nIt's a folder with a `SKILL.md` file (in `~/.claude/skills/`) describing the\ntask. You don't write it by hand — ask Claude:\n\n> *\"I do this every week: [describe the task]. Turn it into a skill I can rerun\n> by name.\"*\n\nNow you (or a teammate you send the folder to) can trigger it with `/name`\ninstead of re-explaining. This is the payoff of the reuse-then-share thread:\n**you teach the work once, and it's done forever after — by you or anyone you\nshare it with.**\n\n**✓ Done when** you've built a skill and triggered it once with `/name`.\n\n**Now try →** run your new skill, then say *\"that worked — now make it ask me for\nthe one input that changes each time, and save the improvement.\"* You just\nedited a capability instead of redoing a task.\n\n---\n\n## 7 · (Mac) Run several at once — Superconductor\n\n**Goal:** more than one Claude Code session working in parallel. **~10 min.**\n\nAgents are slow, and you shouldn't sit watching one. The real unlock is running\n**several Claude Code sessions in parallel**, each on a different task. You can\ndo this in plain terminal windows, but on a Mac there's a much nicer way:\n**[Superconductor](https://super.engineering)** (from super.engineering).\n\nIt's a native Mac app that runs many agents side by side, keeps each one's work\nisolated so they don't collide, and gives you a clean view to review and ship\ntheir changes — no terminal juggling. It's free while in alpha; you'll want\nClaude Code installed first (it drives Claude Code under the hood, using your\nown account).\n\n→ [Superconductor vs. plain terminal vs. an editor — and what Windows users\nshould do →](decisions/interface.md)\n\n**✓ Done when** you've got two agents running at once and have flipped between\nthem.\n\n**Now try →** set one agent on real work, then in a second one ask: *\"Review\nwhat the other session just did and tell me if you'd have done it differently.\"*\nTwo agents, one checking the other.\n\n---\n\nYou now have the tool most people should end up using day to day. [Part 3](03-power-ups.md)\nadds optional power-ups; [the last page](04-now-what.md) is about what to\nactually delegate.\n", "03-power-ups.md": "# Part 3 — Power-ups (optional)\n\nEverything here is optional and self-contained. Skip to [the last page](04-now-what.md)\nif you'd rather just start delegating; come back when you hit a wall.\n\nThe first power-up — full control of your Google Workspace — comes in two\npieces: install the tools (quick), then do the one genuinely tedious setup\n(a Google Cloud project). They're split so you get a win before the tedious\npart.\n\n- [ ] **1** · Install the Workspace CLIs\n- [ ] **2** · The one tedious setup — a Google Cloud project\n\n---\n\n## 1 · Install the Workspace CLIs\n\n**Goal:** the command-line tools that let Claude Code truly *work* your Google\naccount — not just read it. **~5 min.**\n\nIn Part 1 you connected Google to Cowork, but those connectors mostly *read*. If\nyou want Claude to genuinely *work* your Google account — send email, edit a doc\nwith real formatting, manage your calendar — you give it its own command-line\ntools instead of borrowing Cowork's connectors.\n\n**The distinction worth understanding:**\n\n- A **connector** (what Cowork uses) is *rented hands*: Anthropic's servers act\n  on your behalf, with capped abilities — great for reading, limited for doing.\n- A **CLI** like `gog` or `gdoc` is *your own hands*: it runs on your machine\n  with full read-and-write access, it's scriptable, and Claude can use it inside\n  skills.\n\nYou can reuse Cowork's connectors in Claude Code, so this is strictly optional —\nwhat you gain is everything the connectors can't do. → [Connector vs. MCP vs.\nCLI, per app →](decisions/workspace-access.md)\n\n**The two tools:**\n- **`gog`** ([gogcli.sh](https://gogcli.sh)) — the broad one. Gmail, Calendar,\n  Drive, and light Docs/Sheets across your whole Workspace.\n- **`gdoc`** ([on GitHub](https://github.com/LucaDeLeo/gdoc)) — the focused one,\n  for real Google Docs editing: writes proper formatting, handles comments and\n  revisions, built for agents.\n\nMost people install `gog` for breadth and add `gdoc` when they do serious doc\nediting. Ask Claude Code to install whichever you want — it'll fetch the tool\nand tell you what it still needs from you (that's the next mission).\n\n**✓ Done when** the tool is installed and the only thing left is to give it\ncredentials.\n\n**Now try →** *\"You're installed — what exactly can you do in my Google account\nonce I finish the credentials, that the Cowork connectors couldn't?\"*\n\n---\n\n## 2 · The one tedious setup — a Google Cloud project\n\n**Goal:** your own Google Cloud credentials, so the CLIs can sign in — set up\nonce, correctly, so it never logs you out. **~5–15 min.**\n\nBoth tools need you to create your own Google Cloud project and credentials —\nabout 5–15 minutes of clicking through Google's console. There's no way around\nthe clicking, but there are two ways to make it bearable.\n\n**Let an agent do the clicking.** The setup is mostly navigating web pages, which\nis exactly what computer-use agents are good at. Open the **Codex desktop app**\n(its computer use is strong), point it at the console, and watch it work through\nthe steps while you supervise. Or ask Claude Code to walk you through each step\nlive.\n\n**The steps** (whoever does them):\n1. Create a project at [console.cloud.google.com](https://console.cloud.google.com).\n2. Enable the APIs you need (Gmail, Calendar, Drive, Docs, Sheets).\n3. Configure the OAuth consent screen — **and set it to \"In production\"** (see\n   the warning below).\n4. Create **OAuth credentials of type \"Desktop app,\"** download the JSON.\n5. Drop the JSON where the tool expects it and run its sign-in command.\n\n> ⚠️ **The trap that catches everyone: publish the app.** If you leave the\n> consent screen in \"Testing\" mode, Google silently revokes your access **every\n> 7 days** — Claude gets logged out weekly and you'll wonder why. Set the\n> publishing status to **\"In production\"** (for personal use you can do this\n> without Google's full review), or, if you're inside a Google Workspace\n> organization, set the user type to **\"Internal.\"** Do this now and save\n> yourself a recurring headache.\n\n<details>\n<summary>I'm nervous about \"In production\" and Google's verification warnings →</summary>\n\nFor a personal-use app that only you sign into, flipping to \"In production\" is\nfine — you'll see an \"unverified app\" screen when you first authorize, and you\nclick through it (it's your own app). Full Google verification is only needed\nwhen you distribute an app to outside users, which you're not. If you're on a\nWorkspace org account, \"Internal\" avoids the screen entirely.\n</details>\n\n**✓ Done when** you've run the tool's sign-in command and it reports connected —\nwith the consent screen set to \"In production\" (or \"Internal\").\n\n**Now try →** *\"Send me a test email to myself with the subject 'it works,' then\ncreate a Google Doc titled 'first agent doc' with a heading and a bullet\nlist.\"* That's the write access the connectors never had.\n", "04-now-what.md": "# Now what — actually delegating\n\nYou have the tools. The skill now is spotting what to hand off and handing it\noff well. Three habits carry most of the value — read them, then do the one\nthing at the bottom.\n\n## Find the work: the 5× rule\n\nAnything you'll do five or more times, ask whether Claude can do it — or set it\nup so Claude does it from now on. Recurring, fiddly, or boring is a feature, not\na disqualifier: those are the tasks worth turning into a skill once and never\ndoing by hand again.\n\nAnd go after the tasks you currently *skip* — too technical, too small, too\nslow, too vague to start. Those are where delegation changes what you're capable\nof, not just how fast you are.\n\n## Hand it off well: verify, trust, or don't care\n\nYou can't just say \"estimate our churn next quarter\" and trust the result. For\nevery piece of a task, know which of three buckets it's in:\n\n- **Verify it** — you'll check the output. Ask for the source next to the\n  answer, run the code, or have a second model critique the first. Break the\n  task into pieces you *can* check.\n- **Trust it** — you've seen Claude do this kind of thing well before, so you\n  let it ride.\n- **Don't care** — the cost of it being wrong is near zero.\n\nIf a piece fits none of these, decompose it until each piece does. That's the\nwhole craft of delegation.\n\n## Don't wait: run many at once\n\nAgents are slow, and you are not idle. The moment you've set one going, start\nanother — a different task, a check on the first one's work, a second opinion\nfrom a second model. Your throughput isn't one agent's speed; it's how many\nuseful things you have in flight. (On a Mac, [Superconductor](decisions/interface.md)\nmakes this the default way of working.)\n\n---\n\n## Do this now: your first real delegation\n\n**Goal:** hand off one task that's actually yours — not a practice run.\n\nPick the one that looks most like your real work and go:\n\n- **Inbox → action:** *\"Read my unread email from this week, group it by what it\n  needs from me, and draft replies to the three most urgent.\"*\n- **Documents → answer:** *\"Here are twelve PDFs. Pull out [the numbers I care\n  about] and build me a spreadsheet, with a link back to the source for each.\"*\n- **Recurring report:** *\"Every Monday I write a status update from these three\n  sources. Do it this week, then turn it into a skill so I can rerun it.\"*\n- **The thing you've been avoiding:** the task you keep not starting because it's\n  vague. Describe it out loud, mess and all, and ask Claude where to begin.\n\n**✓ Done when** you've delegated something you'd otherwise have done yourself —\nand gotten back something you can use.\n\n**Now try →** while that one runs, start a second: point a fresh agent at the\nsame result and say *\"critique this and tell me what you'd fix.\"* That's the\nwhole way of working, in two windows.\n\nStuck on any of it? The assistant in the sidebar has this whole guide loaded.\nTell it what you're trying to do — or what went wrong — and it'll take you from\nthere.\n", "decisions/account.md": "# Team or personal account? Which tier?\n\n**Recommendation: if your organization gives you a Claude Team seat, use it —\nand make sure it's a seat that includes Cowork and Claude Code. If you're on\nyour own, get a Max plan.**\n\n## The short version\n\n- **Team account** — the company pays, IT manages seats, and you get single\n  sign-on and shared billing. This is the right default for most people reading\n  this, because most of you are at an org that's rolling Claude out.\n- **Personal Max** — you pay, and you get the highest usage ceiling of any\n  individual plan. This is what independent power users pick.\n\nBoth give you the full model lineup and both work for everything in this guide.\nThe real differences are *who administers it* and *how much you can use before\nhitting limits*.\n\n## The one thing to check on a Team plan\n\nNot every Team seat includes the agent tools. As of mid-2026, **Cowork and the\nrichest usage come with the premium Team seats, not the standard ones.** If your\nTeam account can't open Cowork, that's why — ask whoever manages your Claude\naccount to upgrade your seat, or fall back to a personal Pro/Max plan.\n\n## The tiers, roughly\n\n| Plan | ~Price | Gets you |\n|---|---|---|\n| Free | $0 | Chat only — **no Claude Code, no Cowork** |\n| Pro | ~$20/mo | Unlocks Claude Code + Cowork; modest usage |\n| Max 5× | ~$100/mo | Same features, ~5× the usage |\n| Max 20× | ~$200/mo | ~20× the usage — heavy Claude Code users |\n| Team | ~$25–125/seat/mo | Pro-level features + SSO, admin, shared billing (Cowork on premium seats) |\n| Enterprise | Custom | Team + governance, audit logs, compliance |\n\n*Prices and what's bundled change often — [check claude.com/pricing](https://claude.com/pricing)\nfor today's numbers.*\n\n## If both matter\n\nSome people at organizations keep **both**: a Team seat for the work the company\ngoverns and bills, and a personal Max 20× for their own heavy Claude Code use,\nbecause a single Max seat can carry more raw usage than a standard Team seat.\nIt's not either/or if your usage justifies it — but start with the Team seat and\nadd Max only if you actually hit its limits.\n", "decisions/which-model.md": "# Which model?\n\n**Use the best one. Always. On anything you care about.**\n\nModels come in tiers — a fast one, a standard one, and a most-capable one\n(Anthropic's are Haiku, Sonnet, Opus). It's tempting to reach for a cheaper or\nfaster model to save time or money. Two reasons you'd do that, and why neither\nholds:\n\n**\"The best model is slower.\"** True — the strongest model thinks longer. But\nyou don't beat that by downgrading the model; you beat it by not waiting. Start\nthe task, switch to another window, and do the next thing. Speed comes from\nrunning several at once, not from a weaker mind on the one that matters.\n\n**\"The best model costs more.\"** It does, and it's still the cheapest thing in\nthe exchange. The task you're delegating is worth far more to you than the few\ndollars of difference — that's *why* you're delegating it. If you run out of\ncredits, buy more; you'll come out ahead. You may not believe this yet. You\nwill after a week.\n\nSo there's no real decision here. Pick the top model, leave it there, and spend\nyour attention on the work instead of the dial.\n\n*The exception that proves the rule: for a genuinely trivial, high-volume,\nthrowaway task where you'll glance at the output and move on, a fast model is\nfine. When it matters, top model.*\n", "decisions/dictation.md": "# Talking to Claude instead of typing\n\n**Recommendation: install Wispr Flow and dictate almost everything you say to\nClaude.**\n\nThe single habit that most improves what you get back is talking instead of\ntyping. Not because it's faster to produce words — because it changes *which*\nwords you produce. When you type, you tidy up: you trim the context, drop the\ncaveats, and hand over a clean-looking request that's missing half of what's in\nyour head. When you talk, you ramble — and the ramble is the good part. The\naside about why you care, the two approaches you're torn between, the thing\nyou're unsure about: that's exactly the context that makes Claude's answer fit.\n\nSo say the messy version out loud. State the problem, say what you want, name\nwhat you're unsure about, and don't clean it up.\n\n**The tool: [Wispr Flow](https://wisprflow.ai).** It transcribes your speech\ninto whatever text field you're in, anywhere on your computer, faster and more\naccurately than the built-in dictation on Mac or Windows, and it handles the\nrambling gracefully. There are alternatives (macOS/Windows built-in dictation,\nFluidVoice, others); Wispr is the one worth paying for. Install it, set a\npush-to-talk key, and use it for every message longer than a sentence.\n", "decisions/trust-and-permissions.md": "# How much should you trust the agent?\n\nBoth Cowork and Claude Code will ask your permission before doing certain\nthings, and you get to decide how much to wave through. Here's how to think\nabout it.\n\n## What you're actually deciding\n\nWhen a permission prompt appears, you're **not** judging whether Claude is\ncompetent enough to do the thing. You're judging one question: **if this goes\nwrong, can I undo it?**\n\n- **Reversible** — editing a file, writing a draft, reorganizing a folder,\n  reading things. Let these through freely. If Claude gets it wrong, you fix it\n  or revert it in seconds. Stopping to approve each one costs you more than the\n  mistakes ever will.\n- **Irreversible or outward-facing** — sending an email, publishing, paying,\n  deleting something not in version control. *These* are the prompts to\n  actually read. The cost of a mistake here isn't \"undo\"; it's a message you\n  can't unsend.\n\nThis is why, in Claude Code, we recommend turning on auto-accept for edits (see\nbelow): once your work is under git, every edit is reversible, so approving each\none is pure friction guarding against nothing.\n\n## The prompt-injection worry\n\nMany people hesitate to connect their email or let an agent browse the web\nbecause of *prompt injection* — the fear that a malicious web page or email\ncould smuggle in an instruction that hijacks your assistant into leaking data\nor spending your money.\n\nThe honest state of things (mid-2026): this attack is real in theory and\n**vanishingly rare in practice.** Across the major assistants from Anthropic,\nOpenAI, and Google, there have been no publicly documented cases of large\nfinancial harm from it. The labs are, for now, winning the defense-vs-offense\nrace, and your realistic chance of six-figure harm this year is well under one\nin a thousand. Ordinary user error — you telling it to do the wrong thing — is\nmore than ten times likelier to cause you trouble.\n\nThat may change as attackers put more effort in. But today the calculus is\nclear: **connect your accounts and enable browsing.** The productivity is real\nand immediate; the injection risk is speculative and tiny. Spend your caution\non the irreversible-action prompts above, not on whether to plug in at all.\n\n## The spectrum, and where we land\n\n- **Paranoid:** a dedicated VM or container per project, strict allowlists.\n  Reasonable for some; overkill for most.\n- **Our default:** allow the reversible freely, keep prompts on the\n  irreversible, keep your work in git so \"undo\" is always available.\n- **YOLO:** skip all permission checks (`--dangerously-skip-permissions`). Too\n  risky on your real machine; fine only inside a throwaway sandbox.\n\nLand in the middle. It's where the friction and the risk are both low.\n", "decisions/connectors.md": "# Which connectors are worth it?\n\n**Recommendation: connect Google Drive, Gmail, and Calendar right away. Add\nothers only when a task actually needs them.**\n\nConnectors are how Cowork reaches your apps. Each one you add is an account you\nlet Claude read and (sometimes) act in. More isn't better — each is a bit of\naccess you're granting, and unused ones are just surface area. So connect the\nfew that pay off immediately and leave the rest until you have a reason.\n\n## The ones that pay off immediately\n\n- **Google Drive** — lets Claude read and work from your documents. High value,\n  low risk (it's mostly reading).\n- **Gmail** — reading and triaging email is one of the most useful things Cowork\n  does.\n- **Google Calendar** — needed for anything scheduling-related.\n\n## Add when needed\n\n- **Slack, Notion, and similar** — genuinely useful, but connect them when you\n  have a task in hand, not preemptively.\n- **Anything that can send or post on your behalf** — worth a moment's thought\n  before connecting, because those actions are the irreversible kind (see\n  [trust and permissions](trust-and-permissions.md)).\n\n## The limit to know about\n\nCowork's built-in Google connectors mostly **read**. When you want Claude to\n*write* — send an email, edit a doc with formatting — you'll hit their ceiling.\nThat's the moment to move to the [Google Workspace CLI setup in Part 3](../03-power-ups.md),\nwhich gives Claude Code full read-and-write control. Connectors get you started;\nthe CLI is the upgrade.\n", "decisions/cowork-vs-code.md": "# Cowork or Claude Code for this task?\n\n**Recommendation: default to Claude Code once you're set up. Reach for Cowork\nwhen you want zero friction, or when you're away from your own machine.**\n\nThey're the same assistant with a different amount of fence around it. The\nchoice is really \"how much freedom does this task need, and how much setup am I\nwilling to spend?\"\n\n## Use Cowork when\n\n- You haven't set up Claude Code yet, or you're on a machine that isn't yours.\n- The task lives inside your files and connected apps — read this doc, organize\n  this folder, draft from these sources.\n- You want it to just work, with a sandbox making mistakes safe by default.\n\n## Use Claude Code when\n\n- The task needs the fence gone: installing a tool, calling an arbitrary web\n  service, logging into a command-line tool, editing your Google Docs for real.\n- You want it to run for a long time, or several agents at once.\n- It's something you'll repeat — Claude Code's `CLAUDE.md` and skills make it\n  stick.\n\n## The honest summary\n\nCowork is the softer landing and a genuinely good tool; Claude Code is where\nmost people end up for real work because nothing is fenced off. If you've done\nthe [Part 2](../02-claude-code.md) setup, let Claude Code be your default and\nkeep Cowork for the quick, from-anywhere jobs.\n", "decisions/interface.md": "# Superconductor, plain terminal, or an editor?\n\n**Recommendation: on a Mac, use Superconductor. On Windows or Linux, use plain\nterminal windows for now. Reach for a code editor's integration only if you're\nalready living in one.**\n\nThe question is how you *run* Claude Code — the engine is the same either way.\nWhat differs is how easily you can run several agents at once and review their\nwork, which is where most of the productivity comes from.\n\n## Superconductor (Mac)\n\nA native Mac app from [super.engineering](https://super.engineering) built for\nexactly this: many Claude Code sessions in parallel, each isolated so they don't\nstep on each other, with a clean view to review and ship what they change. For a\nnewcomer it hides the parts of running parallel agents that would otherwise mean\nlearning git branching by hand.\n\n- **Cost:** free while in alpha; no paid tier published.\n- **Needs:** Claude Code installed and your own Claude account — it drives Claude\n  Code under the hood and never sees your credentials.\n- **Catch:** Mac only (Apple Silicon), and still alpha. Windows and Linux are\n  planned but not here yet.\n\n*(Don't confuse it with superconductor.com — a different, cloud-based product.\nThe one we mean is super.engineering.)*\n\n## Plain terminal (any OS)\n\nJust open several terminal windows or tabs and run `claude` in each. It's what\nSuperconductor automates, done manually. Entirely fine — a little more juggling,\nno extra software, works everywhere. **This is the answer for Windows and Linux\ntoday.**\n\n## A code editor (VS Code, etc.)\n\nClaude Code integrates with editors like VS Code. Worth it *if you already work\nin one* and want the diffs and file tree right there. If you don't, don't adopt\nan editor just for this — it's a whole tool to learn for a benefit\nSuperconductor or a terminal already gives you.\n", "decisions/workspace-access.md": "# Connector, MCP, or CLI for Google Workspace?\n\n**Recommendation: start with Cowork's built-in connectors. When you need Claude\nto reliably *write* — send mail, edit docs — move to the `gog` and `gdoc`\ncommand-line tools in Claude Code.**\n\nThere are three ways to give Claude access to your Google apps, in increasing\norder of power and setup.\n\n## Connector — rented hands\n\nThe built-in connectors you set up in [Cowork](../01-cowork.md). Anthropic's\nservers act on your behalf.\n\n- **Best for:** reading — search mail, pull a doc, check the calendar.\n- **Setup:** a click and a Google sign-in.\n- **Limit:** mostly read-only; writing is capped or unavailable.\n\n## MCP server — a middle option\n\nA connector you install yourself that exposes more of an app's abilities to\nClaude. More capable than the built-in connectors, more setup than a click.\nReasonable if you want write access without committing to CLI tools — but for\nGoogle specifically, the CLIs below are the better-trodden path.\n\n## CLI — your own hands\n\nCommand-line tools that run on your machine with full access:\n\n- **`gog`** ([gogcli.sh](https://gogcli.sh)) — broad: Gmail, Calendar, Drive,\n  and light Docs/Sheets across all of Workspace.\n- **`gdoc`** ([GitHub](https://github.com/LucaDeLeo/gdoc)) — focused: real Google\n  Docs editing with proper formatting, comments, and revisions, built to be\n  cheap for agents to use.\n\n- **Best for:** actually doing things — sending, editing, automating — and using\n  inside skills.\n- **Setup:** a one-time Google Cloud project (~10 min; the tedious part, walked\n  through in [Part 3](../03-power-ups.md)).\n- **Payoff:** everything connectors can't do, scriptable and reusable.\n\n## The path\n\nConnectors to start, because they're free and instant. The day you find yourself\nwishing Claude could *send* that email or *format* that doc instead of just\nreading it, do the Part 3 CLI setup once and don't look back.\n"}, "nav": {"Guide": [{"path": "00-start-here.md", "label": "Start here"}, {"path": "01-cowork.md", "label": "1 · Claude Cowork"}, {"path": "02-claude-code.md", "label": "2 · Claude Code"}, {"path": "03-power-ups.md", "label": "3 · Power-ups"}, {"path": "04-now-what.md", "label": "Now what"}], "Decisions": [{"path": "decisions/account.md", "label": "Account & tier"}, {"path": "decisions/which-model.md", "label": "Which model"}, {"path": "decisions/dictation.md", "label": "Talking to Claude"}, {"path": "decisions/trust-and-permissions.md", "label": "Trust & permissions"}, {"path": "decisions/connectors.md", "label": "Which connectors"}, {"path": "decisions/cowork-vs-code.md", "label": "Cowork vs Code"}, {"path": "decisions/interface.md", "label": "How to run Code"}, {"path": "decisions/workspace-access.md", "label": "Workspace access"}]}};
const {content, nav} = DATA;

function resolve(from, href){
  // resolve a relative .md link against the current page's directory
  const dir = from.includes('/') ? from.slice(0, from.lastIndexOf('/')) : '';
  const parts = (dir ? dir.split('/') : []);
  href.split('/').forEach(p=>{
    if(p==='..') parts.pop();
    else if(p!=='.'&&p!=='') parts.push(p);
  });
  return parts.join('/');
}

function buildNav(){
  const n = document.getElementById('nav');
  for(const sec in nav){
    const h = document.createElement('div'); h.className='sec'; h.textContent=sec;
    n.appendChild(h);
    nav[sec].forEach(item=>{
      const a=document.createElement('a'); a.textContent=item.label;
      a.href='#'+item.path; a.dataset.path=item.path; n.appendChild(a);
    });
  }
}

let currentPath = '00-start-here.md';

function pageContext(){
  const h1 = document.querySelector('main h1');
  return currentPath + (h1 ? ' — ' + h1.textContent : '');
}

function osName(){
  const p = navigator.platform || '', ua = navigator.userAgent || '';
  if(/Mac/i.test(p)) return 'Mac';
  if(/Win/i.test(p)) return 'Windows';
  return (p || 'unknown') + ' · ' + ua.slice(0, 60);
}

function sendFeedback(kind, note){
  fetch('api/feedback', {
    method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({kind, step: pageContext(), os: osName(), note: note||''})
  }).catch(()=>{});
}

function render(path){
  if(!content[path]) path='00-start-here.md';
  currentPath = path;
  const main=document.getElementById('main');
  main.innerHTML = marked.parse(content[path]);
  // make the "things to do" checklists real: enable, restore, persist
  main.querySelectorAll('input[type=checkbox]').forEach((box,i)=>{
    box.disabled=false;
    const key='onramp-check:'+path+':'+i;
    box.checked = localStorage.getItem(key)==='1';
    const li=box.closest('li'); if(li) li.classList.toggle('done', box.checked);
    box.onchange=()=>{
      localStorage.setItem(key, box.checked?'1':'0');
      if(li) li.classList.toggle('done', box.checked);
    };
  });
  // rewrite intra-guide .md links to hash routes
  main.querySelectorAll('a[href]').forEach(a=>{
    const href=a.getAttribute('href');
    if(href.endsWith('.md') || href.includes('.md#')){
      const clean=href.replace('#','');
      a.setAttribute('href', '#'+resolve(path, clean));
    }
  });
  const fb=document.createElement('div'); fb.className='didntwork';
  const btn=document.createElement('button');
  btn.textContent="This step didn't work for me";
  btn.onclick=()=>{
    const form=document.createElement('div'); form.className='form';
    form.innerHTML='<input placeholder="What happened? (optional)">'
      +'<button>Send</button>';
    fb.replaceChildren(form);
    const done=()=>{
      sendFeedback('didnt-work', form.querySelector('input').value);
      fb.innerHTML='<span class="thanks">Thanks — logged. Tell the assistant '
        +'what you see and it can likely unstick you now.</span>';
    };
    form.querySelector('button').onclick=done;
    form.querySelector('input').onkeydown=e=>{ if(e.key==='Enter') done(); };
    form.querySelector('input').focus();
  };
  fb.appendChild(btn);
  main.appendChild(fb);
  document.querySelectorAll('nav a').forEach(a=>
    a.classList.toggle('active', a.dataset.path===path));
  main.scrollTo?.(0,0); window.scrollTo(0,0);
}

// ---- assistant chat -------------------------------------------------------
const chat = document.getElementById('chat');
const ask = document.getElementById('ask');
const history = [];   // Anthropic-format messages
let pendingImages = []; // {media_type, data}
let busy = false;

function addBubble(role){
  const div=document.createElement('div');
  div.className='msg '+role;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function greet(){
  const g=addBubble('assistant');
  g.innerHTML="Hi — I have the full guide in front of me. Tell me what you're "
    +"trying to do, or paste a screenshot of what you're seeing, and I'll get "
    +"you to the next step.";
}

function drawAttachments(){
  const strip=document.getElementById('attachments');
  strip.replaceChildren(...pendingImages.map((img,i)=>{
    const d=document.createElement('div'); d.className='thumb';
    const im=document.createElement('img');
    im.src='data:'+img.media_type+';base64,'+img.data;
    const x=document.createElement('button'); x.textContent='×';
    x.onclick=()=>{ pendingImages.splice(i,1); drawAttachments(); };
    d.append(im,x); return d;
  }));
}

function addImage(file){
  // Downscale client-side so requests stay under Vercel's body limit.
  const img=new Image();
  img.onload=()=>{
    const MAX=1400, s=Math.min(1, MAX/Math.max(img.width, img.height));
    const c=document.createElement('canvas');
    c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    const data=c.toDataURL('image/jpeg',0.85).split(',')[1];
    pendingImages.push({media_type:'image/jpeg', data});
    drawAttachments();
    URL.revokeObjectURL(img.src);
  };
  img.src=URL.createObjectURL(file);
}

ask.addEventListener('paste', e=>{
  for(const item of e.clipboardData.items)
    if(item.type.startsWith('image/')){ addImage(item.getAsFile()); e.preventDefault(); }
});
document.getElementById('file').onchange=e=>{
  if(e.target.files[0]) addImage(e.target.files[0]);
  e.target.value='';
};
ask.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
document.getElementById('send').onclick=()=>send();

async function send(){
  const text=ask.value.trim();
  if(busy || (!text && !pendingImages.length)) return;
  busy=true; ask.value='';

  const blocks=[
    ...pendingImages.map(i=>({type:'image',
      source:{type:'base64', media_type:i.media_type, data:i.data}})),
    ...(text ? [{type:'text', text}] : [])
  ];
  const u=addBubble('user');
  u.textContent=text;
  pendingImages.forEach(i=>{
    const im=document.createElement('img'); im.className='shot';
    im.src='data:'+i.media_type+';base64,'+i.data; u.appendChild(im);
  });
  pendingImages=[]; drawAttachments();
  history.push({role:'user', content:blocks});

  const a=addBubble('assistant');
  a.innerHTML='<span class="status">Thinking…</span>';
  let answer='', searched=false;
  try{
    const resp=await fetch('api/assistant', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({messages: history.slice(-20), page: pageContext()})
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err.error || ('HTTP '+resp.status));
    }
    const reader=resp.body.getReader(), dec=new TextDecoder();
    let buf='';
    for(;;){
      const {done, value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value, {stream:true});
      const events=buf.split('\n\n'); buf=events.pop();
      for(const ev of events){
        const line=ev.split('\n').find(l=>l.startsWith('data: '));
        if(!line) continue;
        let d; try{ d=JSON.parse(line.slice(6)); }catch{ continue; }
        if(d.type==='content_block_start' && d.content_block?.type==='server_tool_use'){
          searched=true;
          a.innerHTML=marked.parse(answer)
            +'<span class="status">Searching the docs…</span>';
        }else if(d.type==='content_block_delta' && d.delta?.type==='text_delta'){
          answer+=d.delta.text;
          a.innerHTML=marked.parse(answer);
        }else if(d.type==='error'){
          throw new Error(d.error?.message || 'stream error');
        }
        chat.scrollTop=chat.scrollHeight;
      }
    }
    a.innerHTML=marked.parse(answer || '_(no reply)_');
    history.push({role:'assistant', content:[{type:'text', text:answer}]});
    // Stream 2 of the feedback loop: questions the assistant had to search for
    // are candidate gaps in the guide (assistant/spec.md).
    if(searched && text) sendFeedback('assistant-searched', text);
  }catch(err){
    history.pop(); // let the user retry the same question
    a.innerHTML='<span class="status">'+
      (String(err.message).includes('not configured')
        ? 'The assistant isn\'t connected on this deployment yet (missing API key).'
        : 'Something went wrong: '+err.message+' — try again.')
      +'</span>';
    if(text) sendFeedback('assistant-error', err.message+' — q: '+text);
  }finally{
    busy=false;
    chat.scrollTop=chat.scrollHeight;
  }
}

buildNav();
greet();
addEventListener('hashchange', ()=>render(location.hash.slice(1)));
render(location.hash.slice(1) || '00-start-here.md');
</script>
